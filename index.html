<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shopify Business Finder</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Shopify Business Finder</h1>

<p>Search UK businesses by postcode prefix</p>

<input id="postcode" placeholder="Example: CM1">

<select id="platform">
<option value="all">All Platforms</option>
<option value="Shopify">Shopify</option>
<option value="WooCommerce">WooCommerce</option>
<option value="Magento">Magento</option>
<option value="Wix">Wix</option>
</select>

<button onclick="searchBusinesses()">Search</button>

<button onclick="downloadCSV()">Export CSV</button>


<table>

<thead>
<tr>
<th>Business</th>
<th>Address</th>
<th>Website</th>
<th>Platform</th>
</tr>
</thead>

<tbody id="results">

</tbody>

</table>


</div>


<script src="app.js"></script>

</body>
</html>
