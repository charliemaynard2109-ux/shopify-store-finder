<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shopify Business Finder</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h1>
Shopify Business Finder
</h1>


<div class="search-box">


<input 
id="search"
type="text"
placeholder="Enter postcode prefix e.g. CM1"
>


<select id="platformFilter">

<option value="all">
All Platforms
</option>

<option value="Shopify">
Shopify
</option>

<option value="WooCommerce">
WooCommerce
</option>

<option value="Magento">
Magento
</option>

<option value="Wix">
Wix
</option>

<option value="Squarespace">
Squarespace
</option>

<option value="Unknown">
Unknown
</option>

</select>


<button id="searchButton">
Search
</button>


</div>



<table>


<thead>

<tr>

<th>
Shop Name
</th>


<th>
Address
</th>


<th>
Website
</th>


<th>
Platform
</th>


<th>
Confidence
</th>


<th>
Score
</th>


</tr>


</thead>


<tbody id="results">


</tbody>


</table>


</div>



<script src="app.js"></script>


</body>

</html>
