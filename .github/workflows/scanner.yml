name: Update Business Database

on:

  workflow_dispatch:

  schedule:
    - cron: "0 6 * * *"


permissions:

  contents: write


jobs:


  scan:


    runs-on: ubuntu-latest


    steps:


    - name: Checkout

      uses: actions/checkout@v4



    - name: Setup Python

      uses: actions/setup-python@v5

      with:

        python-version: "3.x"



    - name: Install

      run:

        pip install -r scanner/requirements.txt



    - name: Download postcode data

      run:

        python scanner/download_postcodes.py



    - name: Run scanner

      run:

        cd scanner && python scanner.py



    - name: Save database

      run: |

        git config user.name github-actions

        git config user.email actions@github.com

        git add database.json

        git commit -m "Update database" || exit 0

        git push
