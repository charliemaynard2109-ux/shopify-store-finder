<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopify Store Finder</title>
    <link rel="stylesheet" href="src/style.css">
</head>

<body>

<div class="container">

    <h1>Shopify Store Finder</h1>

    <p class="subtitle">
        Search and analyse Shopify stores
    </p>

    <div class="search-box">

        <input 
            id="storeInput" 
            type="text" 
            placeholder="Enter store URL e.g. example.com"
        >

        <button onclick="findStore()">
            Search
        </button>

    </div>


    <div id="result" class="result">
        Enter a Shopify store to begin.
    </div>


</div>


<script src="src/app.js"></script>

</body>
</html>
