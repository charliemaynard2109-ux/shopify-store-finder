<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shopify Business Finder</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h1>
Shopify Business Finder
</h1>



<div class="search-box">


<input 
    id="search"
    type="text"
    placeholder="Enter postcode (e.g. CM1)"
>



<select id="platformFilter">

<option value="all">
All Platforms
</option>

<option value="Shopify">
Shopify
</option>

<option value="WooCommerce">
WooCommerce
</option>

<option value="Magento">
Magento
</option>

<option value="Wix">
Wix
</option>

<option value="Squarespace">
Squarespace
</option>

<option value="Unknown">
Unknown
</option>

</select>



<button id="searchButton">

Search

</button>


</div>




<div id="results">

</div>



</div>



<script src="src/app.js"></script>


</body>

</html>
